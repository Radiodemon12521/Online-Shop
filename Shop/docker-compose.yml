services:
  shop.client:
    image: ${DOCKER_REGISTRY-}shopclient
    build:
      context: .
      dockerfile: Shop.Client/Dockerfile
    ports:
     - "5025:8080"
    networks:
    - app-network
    depends_on:
    - shop.api

  shop.api:
    image: ${DOCKER_REGISTRY-}shopapi
    build:
      context: .
      dockerfile: Shop.API/Dockerfile
    depends_on:
      - postgres
    networks:
      - app-network
    ports:
     - "5005:8080"
    container_name: api 


  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: secret
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - app-network

  shop.adminclient:
    image: ${DOCKER_REGISTRY-}shopadminclient
    build:
      context: .
      dockerfile: Shop.AdminClient/Dockerfile
    networks: 
      - app-network
    depends_on:
    - shop.api

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:



